keywords:
  must_match_any:
    - data analyst
    - business analyst
    - operations analyst
    - marketing analyst
    - product analyst
    - BI analyst
    - reporting analyst
    - financial analyst
    - data engineer
  reject_if_contains:
    - senior
    - lead
    - manager
    - director
    - principal
    - "5+ years"
    - "3+ years"
    - "4+ years"
    - security clearance
    # Visa sponsorship hard rejects — any of these phrases = auto-disqualify
    - "no sponsorship"
    - "no visa sponsorship"
    - "will not sponsor"
    - "unable to sponsor"
    - "cannot sponsor"
    - "sponsorship not available"
    - "must be authorized to work in the US"
    - "must be authorized to work in the United States"
    - "US citizens and permanent residents only"
    - "US citizens only"
    - "citizens and green card holders only"
    - "green card holders only"
    - "no OPT"
    - "no CPT"
    - "no F-1"
  sponsorship_signals_positive:
    # Phrases that confirm sponsorship is available — strong positive signal
    - "visa sponsorship"
    - "H-1B sponsorship"
    - "H1B sponsorship"
    - "we sponsor visas"
    - "sponsorship available"
    - "OPT welcome"
    - "OPT/CPT welcome"
    - "international students welcome"
