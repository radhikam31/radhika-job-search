# Job portals, search queries, and sponsor whitelist
# career-ops /career-ops-scan reads this file
# scripts/search.sh uses sponsor_whitelist for pre-filtering

# ── Search strategy ────────────────────────────────────────────────────────────
# Pre-filter order (zero cost until step 4):
#   1. Run one WebSearch → collect title + company only
#   2. Filter: title must match target_role_keywords (local, free)
#   3. Filter: company must appear in sponsor_whitelist OR tier (local, free)
#   4. Only then: fetch full JD (costs API call)
#   5. Score and log
#
# This reduces JD fetches by ~70% vs. fetching everything blindly.

# ── LinkedIn search queries (primary source) ───────────────────────────────────
# Optimized for US-wide, entry-level, sponsorship-friendly
# Run one query per session — pick the first that returns 10+ fresh results
linkedin_queries:
  primary:
    - "data analyst entry level new grad 2026 SQL Python"
    - "business analyst entry level new grad 2026 SQL"
    - "operations analyst entry level 2026 SQL Python"
    - "product analyst entry level 2026 SQL"
    - "BI analyst entry level 2026 Tableau Power BI"
  fallback:
    - "associate analyst SQL Python 2026 United States"
    - "junior data analyst SQL Tableau 2026"
    - "analytics associate entry level 2026"

# ── Hard title filter (check before any fetch) ────────────────────────────────
# Reject immediately if title contains any of these
reject_title_keywords:
  - senior
  - lead
  - manager
  - director
  - principal
  - staff
  - head of
  - vp
  - vice president
  - intern          # already graduated
  - contract        # prefer FTE

# ── Hard experience filter (check in JD snippet if visible) ───────────────────
reject_experience_phrases:
  - "3+ years"
  - "3 or more years"
  - "4+ years"
  - "5+ years"
  - "minimum 3 years"
  - "at least 3 years"
  - "no sponsorship"
  - "no visa sponsorship"
  - "will not sponsor"
  - "unable to sponsor"
  - "authorization to work in the U.S. is a precondition"
  - "US citizens only"
  - "green card holders only"

# ── Sponsor whitelist ──────────────────────────────────────────────────────────
# Sources: H-1B LCA filings FY2025 via myvisajobs.com
# Tier 1 = tech companies with direct entry-level programs
# Tier 2 = staffing firms that place candidates at client companies (high volume)
# Tier 3 = consulting/services firms
# Only fetch JD if company appears in any tier OR is unrecognized (flag for review)

